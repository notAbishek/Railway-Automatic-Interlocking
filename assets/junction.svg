<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" font-family="Courier New, monospace">
  <rect width="720" height="340" fill="#07070f"/>

  <!-- Title -->
  <text x="360" y="26" text-anchor="middle" font-size="11" fill="#444" letter-spacing="3">JUNCTION TYPES</text>

  <!-- ── LEFT PANEL: Junction RIGHT ── -->
  <text x="180" y="52" text-anchor="middle" font-size="10" fill="#00C2FF" letter-spacing="2">DIRECTION: RIGHT</text>
  <text x="180" y="68" text-anchor="middle" font-size="9" fill="#444">two tracks merge into one</text>

  <!-- Track A line -->
  <line x1="40" y1="110" x2="160" y2="140" stroke="#2a2a4a" stroke-width="8"/>
  <line x1="40" y1="110" x2="160" y2="140" stroke="#00FF9C" stroke-width="2.5"/>
  <polygon points="158,136 148,132 154,144" fill="#00FF9C"/>
  <text x="24" y="106" font-size="9" fill="#00FF9C">Track A</text>

  <!-- Track B line -->
  <line x1="40" y1="170" x2="160" y2="140" stroke="#2a2a4a" stroke-width="8"/>
  <line x1="40" y1="170" x2="160" y2="140" stroke="#FFB800" stroke-width="2.5"/>
  <polygon points="158,144 148,136 152,148" fill="#FFB800"/>
  <text x="24" y="180" font-size="9" fill="#FFB800">Track B</text>

  <!-- Junction node -->
  <polygon points="160,125 174,140 160,155 146,140" fill="#0d0d1a" stroke="#00C2FF" stroke-width="2"/>
  <text x="160" y="144" text-anchor="middle" font-size="8" fill="#00C2FF">JCT</text>

  <!-- Outgoing line -->
  <line x1="174" y1="140" x2="310" y2="140" stroke="#2a2a4a" stroke-width="8"/>
  <line x1="174" y1="140" x2="310" y2="140" stroke="#555" stroke-width="2.5"/>
  <polygon points="308,136 298,140 308,144" fill="#555"/>
  <text x="240" y="132" text-anchor="middle" font-size="9" fill="#555">continues →</text>

  <!-- State labels -->
  <rect x="40" y="198" width="280" height="50" rx="3" fill="#0a0a14" stroke="#1a1a2e" stroke-width="1"/>
  <text x="50" y="216" font-size="9" fill="#00FF9C">state = false</text>
  <text x="50" y="230" font-size="9" fill="#555">→ routes via primaryNode (Track A)</text>
  <text x="50" y="244" font-size="9" fill="#FFB800">state = true  → routes via secondaryNode (Track B)</text>

  <!-- Divider -->
  <line x1="360" y1="50" x2="360" y2="300" stroke="#111" stroke-width="1"/>

  <!-- ── RIGHT PANEL: Junction LEFT ── -->
  <text x="540" y="52" text-anchor="middle" font-size="10" fill="#00C2FF" letter-spacing="2">DIRECTION: LEFT</text>
  <text x="540" y="68" text-anchor="middle" font-size="9" fill="#444">one track splits into two</text>

  <!-- Incoming line -->
  <line x1="390" y1="140" x2="526" y2="140" stroke="#2a2a4a" stroke-width="8"/>
  <line x1="390" y1="140" x2="526" y2="140" stroke="#555" stroke-width="2.5"/>
  <polygon points="524,136 514,140 524,144" fill="#555"/>
  <text x="458" y="132" text-anchor="middle" font-size="9" fill="#555">← continues</text>

  <!-- Junction node -->
  <polygon points="540,125 554,140 540,155 526,140" fill="#0d0d1a" stroke="#00C2FF" stroke-width="2"/>
  <text x="540" y="144" text-anchor="middle" font-size="8" fill="#00C2FF">JCT</text>

  <!-- Track A line -->
  <line x1="554" y1="140" x2="680" y2="110" stroke="#2a2a4a" stroke-width="8"/>
  <line x1="554" y1="140" x2="680" y2="110" stroke="#00FF9C" stroke-width="2.5"/>
  <polygon points="677,107 667,111 671,122" fill="#00FF9C"/>
  <text x="686" y="106" font-size="9" fill="#00FF9C">Track A</text>

  <!-- Track B line -->
  <line x1="554" y1="140" x2="680" y2="170" stroke="#2a2a4a" stroke-width="8"/>
  <line x1="554" y1="140" x2="680" y2="170" stroke="#FFB800" stroke-width="2.5"/>
  <polygon points="677,167 669,158 678,155" fill="#FFB800"/>
  <text x="686" y="180" font-size="9" fill="#FFB800">Track B</text>

  <!-- State labels -->
  <rect x="390" y="198" width="290" height="50" rx="3" fill="#0a0a14" stroke="#1a1a2e" stroke-width="1"/>
  <text x="400" y="216" font-size="9" fill="#00FF9C">state = false</text>
  <text x="400" y="230" font-size="9" fill="#555">→ exits via primaryNode (Track A)</text>
  <text x="400" y="244" font-size="9" fill="#FFB800">state = true  → exits via secondaryNode (Track B)</text>

  <!-- Bottom note -->
  <text x="360" y="290" text-anchor="middle" font-size="9" fill="#2a2a4a">No tertiary node needed — outgoing connection is a Track edge in the adjacency list</text>
</svg>
