<svg viewBox="0 0 720 620" xmlns="http://www.w3.org/2000/svg" font-family="Courier New, monospace">
  <rect width="720" height="620" fill="#07070f"/>

  <!-- INPUT LAYER -->
  <rect x="40" y="20" width="640" height="80" rx="6" fill="#0d0d1a" stroke="#BF7FFF" stroke-width="1.5"/>
  <text x="360" y="44" text-anchor="middle" font-size="10" fill="#BF7FFF" letter-spacing="3">INPUT LAYER</text>
  <text x="360" y="64" text-anchor="middle" font-size="11" fill="#888">Train ( id, name, type, priority, trackOnUse, direction,</text>
  <text x="360" y="80" text-anchor="middle" font-size="11" fill="#888">startNode, endNode, speed, departureTime, arrivalTime )</text>
  <text x="360" y="96" text-anchor="middle" font-size="11" fill="#888">Track ( id, name, startNode, endNode, distance, minSpeedLimit, maxSpeedLimit )</text>

  <!-- Arrow -->
  <line x1="360" y1="100" x2="360" y2="126" stroke="#333" stroke-width="1.5"/>
  <polygon points="360,130 355,122 365,122" fill="#333"/>

  <!-- SCHEDULER -->
  <rect x="40" y="130" width="640" height="100" rx="6" fill="#0d0d1a" stroke="#00C2FF" stroke-width="1.5"/>
  <text x="360" y="152" text-anchor="middle" font-size="10" fill="#00C2FF" letter-spacing="3">SCHEDULER — PRE-DISPATCH</text>
  <text x="360" y="172" text-anchor="middle" font-size="11" fill="#555">Runs BEFORE any train departs</text>
  <rect x="60" y="178" width="180" height="40" rx="3" fill="#0a0a14" stroke="#00C2FF" stroke-width="0.8"/>
  <text x="150" y="194" text-anchor="middle" font-size="10" fill="#00C2FF">IntervalBuilder</text>
  <text x="150" y="208" text-anchor="middle" font-size="9" fill="#444">PathFinder → TrackIntervals</text>
  <rect x="270" y="178" width="180" height="40" rx="3" fill="#0a0a14" stroke="#00C2FF" stroke-width="0.8"/>
  <text x="360" y="194" text-anchor="middle" font-size="10" fill="#00C2FF">DependencyResolver</text>
  <text x="360" y="208" text-anchor="middle" font-size="9" fill="#444">Blocking → Topo Sort</text>
  <rect x="480" y="178" width="180" height="40" rx="3" fill="#0a0a14" stroke="#00C2FF" stroke-width="0.8"/>
  <text x="570" y="194" text-anchor="middle" font-size="10" fill="#00C2FF">MeetAndPassResolver</text>
  <text x="570" y="208" text-anchor="middle" font-size="9" fill="#444">Opposite dir → Delay</text>

  <!-- Arrow -->
  <line x1="360" y1="230" x2="360" y2="256" stroke="#333" stroke-width="1.5"/>
  <polygon points="360,260 355,252 365,252" fill="#333"/>

  <!-- CORE ENGINE -->
  <rect x="40" y="260" width="640" height="130" rx="6" fill="#0d0d1a" stroke="#FFB800" stroke-width="1.5"/>
  <text x="360" y="282" text-anchor="middle" font-size="10" fill="#FFB800" letter-spacing="3">CORE ENGINE</text>

  <!-- Dispatcher box -->
  <rect x="60" y="292" width="200" height="84" rx="3" fill="#0a0a14" stroke="#FFB800" stroke-width="0.8"/>
  <text x="160" y="310" text-anchor="middle" font-size="10" fill="#FFB800">Dispatcher</text>
  <text x="160" y="326" text-anchor="middle" font-size="9" fill="#444">PriorityQueue</text>
  <text x="160" y="340" text-anchor="middle" font-size="9" fill="#333">1. departureTime</text>
  <text x="160" y="354" text-anchor="middle" font-size="9" fill="#333">2. priority  3. type  4. id</text>
  <text x="160" y="368" text-anchor="middle" font-size="9" fill="#333">→ dispatches one train at a time</text>

  <!-- Arrow dispatcher to pathfinder -->
  <line x1="260" y1="334" x2="290" y2="334" stroke="#FFB800" stroke-width="1.2"/>
  <polygon points="294,334 286,330 286,338" fill="#FFB800"/>

  <!-- PathFinder box -->
  <rect x="294" y="292" width="200" height="84" rx="3" fill="#0a0a14" stroke="#FFB800" stroke-width="0.8"/>
  <text x="394" y="310" text-anchor="middle" font-size="10" fill="#FFB800">PathFinder</text>
  <text x="394" y="326" text-anchor="middle" font-size="9" fill="#00FF9C">Dijkstra</text>
  <text x="394" y="340" text-anchor="middle" font-size="9" fill="#444">EXPRESS / PASSENGER_EXP</text>
  <text x="394" y="356" text-anchor="middle" font-size="9" fill="#888">weight = dist / minSpeedLimit</text>
  <text x="394" y="370" text-anchor="middle" font-size="9" fill="#444">allowedTypes filter applied</text>

  <!-- ConflictDetector box -->
  <rect x="514" y="292" width="150" height="84" rx="3" fill="#0a0a14" stroke="#FF4444" stroke-width="0.8"/>
  <text x="589" y="310" text-anchor="middle" font-size="10" fill="#FF4444">ConflictDetector</text>
  <text x="589" y="326" text-anchor="middle" font-size="9" fill="#444">usedBy list</text>
  <text x="589" y="340" text-anchor="middle" font-size="9" fill="#444">direction check</text>
  <text x="589" y="354" text-anchor="middle" font-size="9" fill="#444">cycle detection</text>
  <text x="589" y="368" text-anchor="middle" font-size="9" fill="#444">time window</text>

  <!-- Arrow pathfinder to conflict -->
  <line x1="494" y1="334" x2="512" y2="334" stroke="#FFB800" stroke-width="1.2"/>
  <polygon points="516,334 508,330 508,338" fill="#FFB800"/>

  <!-- Arrow -->
  <line x1="360" y1="390" x2="360" y2="416" stroke="#333" stroke-width="1.5"/>
  <polygon points="360,420 355,412 365,412" fill="#333"/>

  <!-- SIGNAL CONTROLLER -->
  <rect x="40" y="420" width="640" height="90" rx="6" fill="#0d0d1a" stroke="#00FF9C" stroke-width="1.5"/>
  <text x="360" y="442" text-anchor="middle" font-size="10" fill="#00FF9C" letter-spacing="3">SIGNAL CONTROLLER</text>
  <text x="360" y="462" text-anchor="middle" font-size="11" fill="#555">Default = RED (fail-safe)</text>
  <!-- Signal states row -->
  <rect x="100" y="472" width="60" height="24" rx="3" fill="#FF3333" opacity="0.8"/>
  <text x="130" y="488" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">RED</text>
  <line x1="160" y1="484" x2="178" y2="484" stroke="#555" stroke-width="1.5"/>
  <polygon points="182,484 174,480 174,488" fill="#555"/>
  <rect x="182" y="472" width="80" height="24" rx="3" fill="#FFB800" opacity="0.8"/>
  <text x="222" y="488" text-anchor="middle" font-size="10" fill="#000" font-weight="bold">YELLOW</text>
  <line x1="262" y1="484" x2="280" y2="484" stroke="#555" stroke-width="1.5"/>
  <polygon points="284,484 276,480 276,488" fill="#555"/>
  <rect x="284" y="472" width="110" height="24" rx="3" fill="#FFB800" opacity="0.6"/>
  <text x="339" y="488" text-anchor="middle" font-size="10" fill="#000" font-weight="bold">DBL YELLOW</text>
  <line x1="394" y1="484" x2="412" y2="484" stroke="#555" stroke-width="1.5"/>
  <polygon points="416,484 408,480 408,488" fill="#555"/>
  <rect x="416" y="472" width="70" height="24" rx="3" fill="#00FF9C" opacity="0.9"/>
  <text x="451" y="488" text-anchor="middle" font-size="10" fill="#000" font-weight="bold">GREEN</text>

  <!-- Arrow -->
  <line x1="360" y1="510" x2="360" y2="536" stroke="#333" stroke-width="1.5"/>
  <polygon points="360,540 355,532 365,532" fill="#333"/>

  <!-- DATABASE -->
  <rect x="40" y="540" width="640" height="60" rx="6" fill="#0d0d1a" stroke="#555" stroke-width="1.5"/>
  <text x="360" y="562" text-anchor="middle" font-size="10" fill="#555" letter-spacing="3">DATABASE LAYER — PostgreSQL 3NF</text>
  <text x="360" y="582" text-anchor="middle" font-size="11" fill="#333">trains  |  tracks  |  nodes  |  reservations  |  signals</text>
</svg>
