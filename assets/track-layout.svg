<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="Courier New, monospace">
  <rect width="760" height="340" fill="#07070f"/>

  <!-- Grid dots -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#0d0d18"/>
  </pattern>
  <rect width="760" height="340" fill="url(#dots)"/>

  <!-- Title -->
  <text x="380" y="24" text-anchor="middle" font-size="10" fill="#333" letter-spacing="3">TRACK LAYOUT — 3 STATIONS</text>

  <!-- ── MAIN LINE FORWARD (RIGHT) ── -->
  <!-- Embankment -->
  <rect x="60" y="106" width="640" height="6" rx="2" fill="#111"/>
  <!-- Track -->
  <line x1="60" y1="109" x2="700" y2="109" stroke="#1a1a2a" stroke-width="10"/>
  <line x1="60" y1="109" x2="700" y2="109" stroke="#00FF9C" stroke-width="2"/>
  <!-- Arrow -->
  <polygon points="698,106 688,109 698,112" fill="#00FF9C"/>
  <text x="380" y="100" text-anchor="middle" font-size="8" fill="#00FF9C40" letter-spacing="2">→ RIGHT</text>

  <!-- ── MAIN LINE BACKWARD (LEFT) ── -->
  <rect x="60" y="184" width="640" height="6" rx="2" fill="#111"/>
  <line x1="60" y1="187" x2="700" y2="187" stroke="#1a1a2a" stroke-width="10"/>
  <line x1="700" y1="187" x2="60" y2="187" stroke="#FF7744" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="62,184 72,187 62,190" fill="#FF7744"/>
  <text x="380" y="200" text-anchor="middle" font-size="8" fill="#FF774440" letter-spacing="2">← LEFT</text>

  <!-- ── SIDE TRACK (to Station C) ── -->
  <line x1="380" y1="187" x2="380" y2="288" stroke="#1a1a2a" stroke-width="10"/>
  <line x1="380" y1="187" x2="380" y2="288" stroke="#555" stroke-width="2"/>
  <polygon points="377,286 380,296 383,286" fill="#555"/>

  <!-- ── STATION A ── -->
  <rect x="30" y="90" width="80" height="116" rx="4" fill="#0d0d1a" stroke="#BF7FFF" stroke-width="1.5"/>
  <text x="70" y="108" text-anchor="middle" font-size="8" fill="#BF7FFF" letter-spacing="1">STATION A</text>
  <text x="70" y="120" text-anchor="middle" font-size="7" fill="#5a3a8a">[STA]</text>
  <!-- Platform lines -->
  <line x1="36" y1="130" x2="104" y2="130" stroke="#BF7FFF30" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="36" y1="144" x2="104" y2="144" stroke="#BF7FFF30" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="36" y1="158" x2="104" y2="158" stroke="#BF7FFF30" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="70" y="196" text-anchor="middle" font-size="7" fill="#3a2a5a">2 platforms</text>

  <!-- ── STATION B ── -->
  <rect x="650" y="90" width="80" height="116" rx="4" fill="#0d0d1a" stroke="#BF7FFF" stroke-width="1.5"/>
  <text x="690" y="108" text-anchor="middle" font-size="8" fill="#BF7FFF" letter-spacing="1">STATION B</text>
  <text x="690" y="120" text-anchor="middle" font-size="7" fill="#5a3a8a">[STB]</text>
  <line x1="656" y1="130" x2="724" y2="130" stroke="#BF7FFF30" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="656" y1="144" x2="724" y2="144" stroke="#BF7FFF30" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="656" y1="158" x2="724" y2="158" stroke="#BF7FFF30" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="690" y="196" text-anchor="middle" font-size="7" fill="#3a2a5a">2 platforms</text>

  <!-- ── STATION C ── -->
  <rect x="340" y="296" width="80" height="34" rx="4" fill="#0d0d1a" stroke="#BF7FFF" stroke-width="1.5"/>
  <text x="380" y="313" text-anchor="middle" font-size="8" fill="#BF7FFF" letter-spacing="1">STATION C</text>
  <text x="380" y="324" text-anchor="middle" font-size="7" fill="#5a3a8a">[STC] · 1 platform</text>

  <!-- ── JUNCTION W ── -->
  <polygon points="280,140 296,148 280,156 264,148" fill="#0d0d1a" stroke="#00C2FF" stroke-width="2"/>
  <text x="280" y="152" text-anchor="middle" font-size="7" fill="#00C2FF">JCT W</text>
  <!-- Junction W diagonal to side track -->
  <line x1="280" y1="156" x2="370" y2="187" stroke="#1a1a2a" stroke-width="6"/>
  <line x1="280" y1="156" x2="370" y2="187" stroke="#555" stroke-width="1.5"/>

  <!-- ── JUNCTION E ── -->
  <polygon points="480,140 496,148 480,156 464,148" fill="#0d0d1a" stroke="#00C2FF" stroke-width="2"/>
  <text x="480" y="152" text-anchor="middle" font-size="7" fill="#00C2FF">JCT E</text>
  <!-- Junction E diagonal from side track -->
  <line x1="390" y1="187" x2="480" y2="156" stroke="#1a1a2a" stroke-width="6"/>
  <line x1="390" y1="187" x2="480" y2="156" stroke="#555" stroke-width="1.5"/>

  <!-- ── SIGNALS (small posts) ── -->
  <!-- SIG_A1 -->
  <line x1="158" y1="109" x2="158" y2="90" stroke="#555" stroke-width="1.5"/>
  <circle cx="158" cy="88" r="5" fill="#0d0d1a" stroke="#FFB800" stroke-width="1.5"/>
  <circle cx="158" cy="88" r="2.5" fill="#FF3333"/>
  <text x="158" y="80" text-anchor="middle" font-size="7" fill="#FFB800">A1</text>

  <!-- SIG_A2 -->
  <line x1="158" y1="187" x2="158" y2="206" stroke="#555" stroke-width="1.5"/>
  <circle cx="158" cy="208" r="5" fill="#0d0d1a" stroke="#FFB800" stroke-width="1.5"/>
  <circle cx="158" cy="208" r="2.5" fill="#FF3333"/>
  <text x="158" y="222" text-anchor="middle" font-size="7" fill="#FFB800">A2</text>

  <!-- SIG_JL (before JCT W) -->
  <line x1="240" y1="109" x2="240" y2="90" stroke="#555" stroke-width="1.5"/>
  <circle cx="240" cy="88" r="5" fill="#0d0d1a" stroke="#FFB800" stroke-width="1.5"/>
  <circle cx="240" cy="88" r="2.5" fill="#FF3333"/>
  <text x="240" y="80" text-anchor="middle" font-size="7" fill="#FFB800">JL</text>

  <!-- SIG_JR (after JCT E) -->
  <line x1="520" y1="109" x2="520" y2="90" stroke="#555" stroke-width="1.5"/>
  <circle cx="520" cy="88" r="5" fill="#0d0d1a" stroke="#FFB800" stroke-width="1.5"/>
  <circle cx="520" cy="88" r="2.5" fill="#FF3333"/>
  <text x="520" y="80" text-anchor="middle" font-size="7" fill="#FFB800">JR</text>

  <!-- SIG_B1 -->
  <line x1="602" y1="109" x2="602" y2="90" stroke="#555" stroke-width="1.5"/>
  <circle cx="602" cy="88" r="5" fill="#0d0d1a" stroke="#FFB800" stroke-width="1.5"/>
  <circle cx="602" cy="88" r="2.5" fill="#FF3333"/>
  <text x="602" y="80" text-anchor="middle" font-size="7" fill="#FFB800">B1</text>

  <!-- SIG_B2 -->
  <line x1="602" y1="187" x2="602" y2="206" stroke="#555" stroke-width="1.5"/>
  <circle cx="602" cy="208" r="5" fill="#0d0d1a" stroke="#FFB800" stroke-width="1.5"/>
  <circle cx="602" cy="208" r="2.5" fill="#FF3333"/>
  <text x="602" y="222" text-anchor="middle" font-size="7" fill="#FFB800">B2</text>

  <!-- SIG_C1 -->
  <line x1="380" y1="252" x2="398" y2="252" stroke="#555" stroke-width="1.5"/>
  <circle cx="400" cy="252" r="5" fill="#0d0d1a" stroke="#FFB800" stroke-width="1.5"/>
  <circle cx="400" cy="252" r="2.5" fill="#FF3333"/>
  <text x="414" y="256" font-size="7" fill="#FFB800">C1</text>

  <!-- ── TRACK LABELS ── -->
  <text x="200" y="94" text-anchor="middle" font-size="8" fill="#2a2a4a">T001</text>
  <text x="380" y="94" text-anchor="middle" font-size="8" fill="#2a2a4a">T003</text>
  <text x="560" y="94" text-anchor="middle" font-size="8" fill="#2a2a4a">T004</text>
  <text x="316" y="236" font-size="8" fill="#2a2a4a">T002</text>

  <!-- ── LEGEND ── -->
  <g transform="translate(30, 310)">
    <circle cx="8" cy="8" r="5" fill="#0d0d1a" stroke="#FFB800" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="2" fill="#FF3333"/>
    <text x="18" y="12" font-size="8" fill="#555">Signal (default RED)</text>
    <polygon points="68,2 76,8 68,14 60,8" fill="#0d0d1a" stroke="#00C2FF" stroke-width="1.5" transform="translate(110,0)"/>
    <text x="188" y="12" font-size="8" fill="#555">Junction</text>
    <rect x="260" y="2" width="24" height="12" rx="2" fill="#0d0d1a" stroke="#BF7FFF" stroke-width="1.5"/>
    <text x="290" y="12" font-size="8" fill="#555">Station</text>
    <line x1="360" y1="8" x2="384" y2="8" stroke="#00FF9C" stroke-width="2"/>
    <text x="390" y="12" font-size="8" fill="#555">→ FWD</text>
    <line x1="440" y1="8" x2="464" y2="8" stroke="#FF7744" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="470" y="12" font-size="8" fill="#555">← BWD</text>
  </g>
</svg>
